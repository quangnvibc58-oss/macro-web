name: Update Macro Data

on:
  schedule:
    - cron: '0 0 * * *'     # 7:00 AM Vietnam (UTC+7) = 00:00 UTC
    - cron: '0 14 * * *'    # 9:00 PM Vietnam (UTC+7) = 14:00 UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run scrapers
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          cd scrapers
          python run_all.py 2>&1 | tee scraper.log
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "Scraper failed!"
            exit 1
          fi

      - name: Verify generated data
        run: |
          echo "Verifying generated data files..."
          python3 << 'VERIFY_EOF'
          import json
          from pathlib import Path

          data_dir = Path('data')
          files = ['interest_rates.json', 'exchange_rates.json', 'gold_prices.json', 'fuel_prices.json']

          all_valid = True
          for fname in files:
            fpath = data_dir / fname
            if not fpath.exists():
              print(f"[ERROR] Missing: {fname}")
              all_valid = False
              continue

            try:
              with open(fpath) as f:
                data = json.load(f)
              total_points = sum(len(v.get('data', [])) for v in data.values() if isinstance(v, dict))
              print(f"[OK] {fname}: {len(data)} series, {total_points} points total")
            except Exception as e:
              print(f"[ERROR] Invalid {fname}: {e}")
              all_valid = False

          if not all_valid:
            exit(1)
          print("\nAll data files verified successfully!")
          VERIFY_EOF

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if there are any changes
          if git diff --quiet data/; then
            echo "No data changes detected"
          else
            git add data/
            git commit -m "chore: update data $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            scrapers/*.log
          retention-days: 7
